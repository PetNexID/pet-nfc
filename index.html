<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetNex ID</title>

<style>

body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial;
  background: radial-gradient(circle at top, #1c3b34, #0b1c22 70%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border-radius: 22px;
  padding: 25px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  color: white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.logo {
  width: 150px;
  margin-bottom: 10px;
}

.status {
  background: red;
  padding: 6px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 10px;
}

.tutor-box {
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
}

.whats {
  background: linear-gradient(45deg, #00ffb3, #00c6ff);
}

.ligar {
  background: linear-gradient(45deg, #ff7e5f, #ffb88c);
}

.footer {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.6;
}

</style>

</head>

<body>

<div class="card">

<img src="Logo.png" class="logo">

<div class="status">🚨 PET PERDIDO</div>

<h1 id="nome">Carregando...</h1>

<div class="tutor-box">
Tutor: <strong id="tutor">---</strong>
</div>

<button class="whats" onclick="enviar()">📍 Avisar via WhatsApp</button>
<button class="ligar" onclick="ligar()">📞 Ligar</button>

<div class="footer">PetNex ID</div>

</div>

<script>

let telefone = "";
let nomePet = "";

// 🔥 SUA API
const API = "https://script.google.com/macros/s/AKfycbww_8i3tmo0RTu_q5FCvQl1Q5O5-NDt4yAQ9pigX9Hsb-WCzO4x6qJFCoh3JwB5F3I8/exec";

// 🔍 pega ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 🚫 sem id
if (!id) {
  erro("Link inválido");
} else {
  carregarDados(id);
}

// 🚀 buscar dados
async function carregarDados(id) {

  try {

    let res = await fetch(API + "?id=" + id);
    let data = await res.json();

    if (!data || !data.tel) {
      erro("Erro de dados");
      return;
    }

    nomePet = data.nome;
    telefone = data.tel;

    document.getElementById("nome").innerText = "🐶 " + data.nome;
    document.getElementById("tutor").innerText = data.tutor;

  } catch (e) {
    erro("Erro ao carregar");
  }
}

// ❌ erro
function erro(msg) {
  document.getElementById("nome").innerText = msg;
}

// 📍 Whats
function enviar() {

  if (!telefone) return alert("Telefone não disponível");

  navigator.geolocation.getCurrentPosition((pos) => {

    let maps = "https://maps.google.com/?q=" + pos.coords.latitude + "," + pos.coords.longitude;

    let mensagem = encodeURIComponent(
      "🐶 Encontrei " + nomePet + "!\n📍 " + maps
    );

    window.location.href = "https://wa.me/" + telefone + "?text=" + mensagem;

  });
}

// 📞 ligar
function ligar() {
  if (!telefone) return alert("Telefone não disponível");
  window.location.href = "tel:" + telefone;
}

</script>

</body>
</html>
