<script>

let telefone = "";

async function carregar() {

  try {

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.body.innerHTML = "<h2 style='color:white'>Link inválido</h2>";
      return;
    }

    let api = "https://script.google.com/macros/s/AKfycbzXAwe57c7S4Tb-grelIKpu-EsDuylH8VVzvVTZ_EYkYScSxNnzrLVIKMU-1ltPLIdw/exec";

    let res = await fetch(api + "?id=" + id);
    let texto = await res.text();

    if (texto === "INVALIDO") {
      document.body.innerHTML = "<h2 style='color:white'>Tag inválida</h2>";
      return;
    }

    let dados = JSON.parse(texto);

    document.getElementById("nome").innerText = "🐶 " + dados.nome;
    document.getElementById("tutor").innerText = dados.tutor;

    telefone = dados.tel;

  } catch (e) {
    document.body.innerHTML = "<h2 style='color:white'>Erro ao carregar</h2>";
  }
}

carregar();

function enviar() {
  if (!telefone) return;

  navigator.geolocation.getCurrentPosition(pos => {

    let maps = "https://www.google.com/maps?q=" + pos.coords.latitude + "," + pos.coords.longitude;

    let msg = encodeURIComponent("🐶 Encontrei o pet!\n📍 " + maps);

    window.location.href = "https://wa.me/" + telefone + "?text=" + msg;

  });
}

function ligar() {
  if (!telefone) return;
  window.location.href = "tel:" + telefone;
}

</script>
