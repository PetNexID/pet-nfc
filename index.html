<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetNex ID</title>

<style>

/* 🔥 FUNDO PREMIUM */
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;

  background: radial-gradient(circle at top, #1c3b34, #0b1c22 70%);

  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 🌫️ LUZ AMBIENTE */
body::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,255,180,0.08), transparent 70%);
  top: -100px;
  right: -100px;
}

/* 🧩 MARCA D'ÁGUA */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: url('Logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.04;
  filter: blur(3px);
}

/* 💎 CARD */
.card {
  position: relative;
  z-index: 2;

  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(18px);

  padding: 30px;
  border-radius: 22px;

  max-width: 380px;
  width: 90%;

  text-align: center;

  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.12);

  color: white;
}

/* 🔥 STATUS */
.status {
  background: linear-gradient(45deg, #ff4d4d, #ff0000);
  color: white;
  padding: 8px;
  border-radius: 10px;
  margin-bottom: 15px;
  font-weight: bold;
  font-size: 13px;
}

/* 🔥 LOGO */
.logo {
  width: 160px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 12px rgba(0,255,180,0.3));
}

/* TITULO */
h1 {
  margin: 10px 0;
  font-weight: 500;
}

/* TEXTO */
p {
  color: #ccc;
  margin-bottom: 25px;
  font-size: 14px;
}

/* BOTÃO PRINCIPAL */
button {
  width: 100%;
  padding: 18px;
  font-size: 16px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;

  background: linear-gradient(45deg, #00ffb3, #00c6ff);
  color: #003333;

  transition: 0.25s;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

/* RODAPÉ */
.footer {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.6;
}

</style>

</head>

<body>

<div class="card">

<div class="status">🚨 PET PERDIDO</div>

<img src="Logo.png" class="logo">

<h1 id="nome">🐶 Pet</h1>

<p>Toque abaixo para avisar o dono e enviar sua localização</p>

<button onclick="enviar()">
📍 Enviar localização via WhatsApp
</button>

<div class="footer">PetNex ID • Tecnologia para pets</div>

</div>

<script>

function enviar() {

  const params = new URLSearchParams(window.location.search);
  const telefone = params.get("tel") || "5584999383155";
  const nome = params.get("nome") || "Pet";

  document.getElementById("nome").innerText = "🐶 " + nome;

  if (!navigator.geolocation) {
    alert("Seu dispositivo não suporta localização");
    return;
  }

  navigator.geolocation.getCurrentPosition((pos) => {

    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    let maps = "https://www.google.com/maps?q=" + lat + "," + lng;

    let mensagem = encodeURIComponent(
      "🐶 Encontrei " + nome + "!\n📍 Localização: " + maps
    );

    let url = "https://wa.me/" + telefone + "?text=" + mensagem;

    window.location.href = url;

  }, () => {
    alert("Ative a localização para continuar");
  });

}

/* 🔥 ATUALIZA NOME AUTOMATICAMENTE */
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const nome = params.get("nome") || "Pet";
  document.getElementById("nome").innerText = "🐶 " + nome;
};

</script>

</body>
</html>
