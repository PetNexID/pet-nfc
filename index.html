<!DOCTYPE html>
<html lang="pt-br">
<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetNex ID</title>

<style>

body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial;
  background: radial-gradient(circle at top, #1c3b34, #0b1c22 70%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border-radius: 22px;
  padding: 25px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  color: white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.logo {
  width: 150px;
  margin-bottom: 10px;
}

.status {
  background: linear-gradient(45deg, #ff4d4d, #ff0000);
  padding: 6px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 10px;
}

.tutor-box {
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.tutor-box strong {
  color: #00ffb3;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
}

.whats {
  background: linear-gradient(45deg,#00ffb3,#00c6ff);
}

.ligar {
  background: linear-gradient(45deg,#ff7e5f,#ffb88c);
}

.footer {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.6;
}

</style>

</head>

<body>

<div class="card">

<img src="Logo.png" class="logo">

<div class="status">🚨 PET PERDIDO</div>

<h1 id="nome">Carregando...</h1>

<div class="tutor-box">
Tutor: <strong id="tutor">---</strong>
</div>

<button class="whats" onclick="enviar()">📍 Avisar dono via WhatsApp</button>
<button class="ligar" onclick="ligar()">📞 Ligar para o dono</button>

<div class="footer">PetNex ID • Tecnologia para pets</div>

</div>

<script>

let telefone = "";
let nomePet = "";

// 🔐 pega token
const params = new URLSearchParams(window.location.search);
const token = params.get("t");

// 🚫 bloqueia acesso inválido
if (!token) {
  document.body.innerHTML = "<h2 style='color:white'>Acesso inválido</h2>";
  throw new Error("Sem token");
}

// 🔥 SUA API
const API = "https://script.google.com/macros/s/AKfycbx9rrb6f3E__M34HaZaY-HASOqwPDJuY2xuNW8gccA0wBYBdRF5GWPvd5ZQlxxx9OyO/exec";

// 🔐 busca dados do servidor
fetch(API + "?t=" + token)
  .then(res => res.text())
  .then(data => {

    if (data === "INVALIDO") {
      document.body.innerHTML = "<h2 style='color:white'>Tag inválida</h2>";
      return;
    }

    let obj = JSON.parse(data);

    nomePet = obj.nome;
    telefone = obj.tel;

    document.getElementById("nome").innerText = "🐶 " + obj.nome;
    document.getElementById("tutor").innerText = obj.tutor;

  })
  .catch(() => {
    document.body.innerHTML = "<h2 style='color:white'>Erro ao carregar</h2>";
  });

// 📍 Whats com localização
function enviar() {

  if (!telefone) return alert("Carregando dados...");

  navigator.geolocation.getCurrentPosition((pos) => {

    let maps = "https://www.google.com/maps?q=" + pos.coords.latitude + "," + pos.coords.longitude;

    let msg = encodeURIComponent(
      "🐶 Encontrei " + nomePet + "!\n📍 Localização: " + maps
    );

    window.location.href = "https://wa.me/" + telefone + "?text=" + msg;

  }, () => {
    alert("Ative a localização");
  });
}

// 📞 ligar
function ligar() {
  if (!telefone) return alert("Carregando dados...");
  window.location.href = "tel:" + telefone;
}

</script>

</body>
</html>
