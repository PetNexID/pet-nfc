<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetNex ID • Gerador NFC</title>

<style>

/* 🔥 FUNDO PREMIUM */
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;

  background: radial-gradient(circle at top, #1c3b34, #0b1c22 70%);

  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 🌫️ LUZ AMBIENTE */
body::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,255,180,0.08), transparent 70%);
  top: -100px;
  right: -100px;
}

/* 🧩 MARCA D'ÁGUA */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: url('logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.04;
  filter: blur(3px);
}

/* 💎 CARD */
.card {
  position: relative;
  z-index: 2;

  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(18px);

  padding: 30px;
  border-radius: 22px;

  max-width: 380px;
  width: 90%;

  text-align: center;

  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.12);

  color: white;
}

/* 🔥 LOGO COM GLOW */
.logo-top {
  width: 180px;
  margin-bottom: 15px;

  filter: drop-shadow(0 0 12px rgba(0,255,180,0.25));
}

/* TÍTULO */
h2 {
  margin-bottom: 20px;
  font-weight: 500;
}

/* INPUTS */
input {
  width: 90%;
  padding: 14px;
  margin: 10px 0;

  border-radius: 12px;
  border: none;
  outline: none;

  font-size: 15px;
}

/* BOTÕES */
button {
  width: 90%;
  padding: 14px;
  margin-top: 10px;

  font-size: 15px;
  font-weight: 600;

  border: none;
  border-radius: 14px;
  cursor: pointer;

  transition: 0.25s;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

/* 🎨 PALETA COESA */
.gerar {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
}

.copiar {
  background: linear-gradient(45deg, #00b09b, #00ffb3);
  color: #003333;
}

.testar {
  background: linear-gradient(45deg, #ff7e5f, #ffb88c);
  color: #5a1a00;
}

/* LINK */
#link {
  margin-top: 15px;
  word-break: break-all;
  font-size: 12px;
  color: #ccc;
}

/* RODAPÉ (branding leve) */
.footer {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.6;
}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo-top">

<h2>🐶 Gerador de Tag NFC</h2>

<input id="nome" placeholder="Nome do pet">
<input id="tel" placeholder="WhatsApp (558499...)">

<button class="gerar" onclick="gerar()">Gerar Link</button>
<button class="copiar" onclick="copiar()">Copiar Link</button>
<button class="testar" onclick="testar()">Testar Link</button>

<p id="link"></p>

<div class="footer">PetNex ID • Tecnologia para pets</div>

</div>

<script>

function gerar() {
  let nome = document.getElementById("nome").value.trim();
  let tel = document.getElementById("tel").value.trim();

  if (!nome || !tel) {
    alert("Preencha nome e telefone");
    return;
  }

  let base = "https://pet-nfc-pi.vercel.app/";

  let url = base + "?nome=" + encodeURIComponent(nome) + "&tel=" + tel;

  document.getElementById("link").innerText = url;
}

function copiar() {
  let texto = document.getElementById("link").innerText;

  if (!texto) {
    alert("Gere o link primeiro");
    return;
  }

  navigator.clipboard.writeText(texto);
  alert("Link copiado!");
}

function testar() {
  let texto = document.getElementById("link").innerText;

  if (!texto) {
    alert("Gere o link primeiro");
    return;
  }

  window.open(texto, "_blank");
}

</script>

</body>
</html>
