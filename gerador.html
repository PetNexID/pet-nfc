<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gerador Pet NFC</title>

<style>

/* 🔥 FUNDO MODERNO */
body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;

  background: radial-gradient(circle at top, #1f4037, #0f2027 70%);

  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* 🔥 LOGO COMO ELEMENTO DE FUNDO SUAVE */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: url('logo.png') no-repeat center;
  background-size: contain;
  opacity: 0.05;
  filter: blur(2px);
}

/* 🔥 CARD GLASS */
.card {
  position: relative;
  z-index: 2;

  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);

  padding: 30px;
  border-radius: 20px;

  max-width: 400px;
  width: 90%;

  text-align: center;

  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.15);

  color: white;
}

/* 🔥 LOGO NO TOPO */
.logo-top {
  width: 180px;
  margin-bottom: 15px;
}

/* TITULO */
h2 {
  margin-bottom: 20px;
}

/* INPUTS */
input {
  width: 90%;
  padding: 14px;
  margin: 10px 0;

  border-radius: 10px;
  border: none;
  outline: none;

  font-size: 16px;
}

/* BOTÕES */
button {
  width: 90%;
  padding: 14px;
  margin-top: 10px;

  font-size: 16px;
  font-weight: bold;

  border: none;
  border-radius: 12px;
  cursor: pointer;

  transition: 0.2s;
}

button:hover {
  transform: scale(1.04);
}

/* CORES PREMIUM */
.gerar {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
}

.copiar {
  background: linear-gradient(45deg, #00b09b, #96c93d);
  color: white;
}

.testar {
  background: linear-gradient(45deg, #ff7e5f, #feb47b);
  color: white;
}

/* LINK */
#link {
  margin-top: 15px;
  word-break: break-all;
  font-size: 13px;
  color: #ddd;
}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo-top">

<h2>🐶 Gerador de Tag NFC</h2>

<input id="nome" placeholder="Nome do pet">
<input id="tel" placeholder="WhatsApp (558499...)">

<button class="gerar" onclick="gerar()">Gerar Link</button>
<button class="copiar" onclick="copiar()">Copiar Link</button>
<button class="testar" onclick="testar()">Testar Link</button>

<p id="link"></p>

</div>

<script>

function gerar() {
  let nome = document.getElementById("nome").value.trim();
  let tel = document.getElementById("tel").value.trim();

  if (!nome || !tel) {
    alert("Preencha nome e telefone");
    return;
  }

  let base = "https://pet-nfc-pi.vercel.app/";

  let url = base + "?nome=" + encodeURIComponent(nome) + "&tel=" + tel;

  document.getElementById("link").innerText = url;
}

function copiar() {
  let texto = document.getElementById("link").innerText;

  if (!texto) {
    alert("Gere o link primeiro");
    return;
  }

  navigator.clipboard.writeText(texto);
  alert("Link copiado!");
}

function testar() {
  let texto = document.getElementById("link").innerText;

  if (!texto) {
    alert("Gere o link primeiro");
    return;
  }

  window.open(texto, "_blank");
}

</script>

</body>
</html>
