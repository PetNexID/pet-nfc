<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gerador Pet NFC</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  font-size: 16px;
}

button {
  width: 90%;
  padding: 15px;
  margin-top: 10px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.gerar { background: #007bff; color: white; }
.copiar { background: #28a745; color: white; }
.testar { background: #ff9800; color: white; }

#link {
  margin-top: 15px;
  word-break: break-all;
  color: #333;
}
</style>

</head>

<body>

<div class="card">

<h2>🐶 Gerador de Tag NFC</h2>

<input id="nome" placeholder="Nome do pet">
<input id="tel" placeholder="WhatsApp (558499...)">

<button class="gerar" onclick="gerar()">Gerar Link</button>
<button class="copiar" onclick="copiar()">Copiar Link</button>
<button class="testar" onclick="testar()">Testar Link</button>

<p id="link"></p>

</div>

<script>

function gerar() {
  let nome = document.getElementById("nome").value.trim();
  let tel = document.getElementById("tel").value.trim();

  if (!nome || !tel) {
    alert("Preencha nome e telefone");
    return;
  }

  // 🔥 TROQUE AQUI PELO SEU LINK DO VERCEL
  let base = "https://pet-nfc-pi.vercel.app/";

  let url = base + "?nome=" + encodeURIComponent(nome) + "&tel=" + tel;

  document.getElementById("link").innerText = url;
}

function copiar() {
  let texto = document.getElementById("link").innerText;

  if (!texto) {
    alert("Gere o link primeiro");
    return;
  }

  navigator.clipboard.writeText(texto);
  alert("Link copiado!");
}

function testar() {
  let texto = document.getElementById("link").innerText;

  if (!texto) {
    alert("Gere o link primeiro");
    return;
  }

  window.open(texto, "_blank");
}

</script>

</body>
</html>
