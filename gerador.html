<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetNex ID • Gerador</title>

<style>

body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at top, #1c3b34, #0b1c22 70%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 30px;
  border-radius: 22px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  color: white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.Logo {
  width: 160px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 10px rgba(0,255,180,0.3));
}

input {
  width: 90%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 15px;
}

button {
  width: 90%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
}

.gerar { background: linear-gradient(45deg,#00c6ff,#0072ff); color:white; }
.copiar { background: linear-gradient(45deg,#00b09b,#00ffb3); }
.testar { background: linear-gradient(45deg,#ff7e5f,#ffb88c); }

#link {
  margin-top: 15px;
  font-size: 12px;
  color: #ccc;
  user-select: none;
}

#status {
  margin-top: 10px;
  font-size: 13px;
}

#hora {
  margin-top: 5px;
  font-size: 12px;
  color: #aaa;
}

.footer {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.6;
}

</style>

</head>

<body>

<div class="card">

<img src="Logo.png" class="Logo">

<h2>🐶 Gerador NFC 🐶</h2>

<input id="tag" placeholder="Código da TAG">
<input id="nome" placeholder="Nome do pet">
<input id="tel" placeholder="WhatsApp (5584...)">
<input id="tutor" placeholder="Nome do tutor">

<button class="gerar" onclick="gerar()">Gerar Link</button>
<button class="copiar" onclick="copiar()">Copiar</button>
<button class="testar" onclick="testar()">Testar</button>

<p id="status"></p>
<p id="hora"></p>
<p id="link"></p>

<div class="footer">PetNex ID • Tecnologia para pets</div>

</div>

<script>

let linkGerado = "";

// 🔒 truncar link (anti-pirataria)
function truncarLink(url) {
  if (url.length <= 40) return url;
  let inicio = url.substring(0, 25);
  let fim = url.substring(url.length - 10);
  return inicio + "..." + fim;
}

function formatarDataHora() {
  let agora = new Date();
  return agora.toLocaleDateString('pt-BR') + " " + agora.toLocaleTimeString('pt-BR');
}

async function gerar() {

  let tag = document.getElementById("tag").value.trim();
  let nome = document.getElementById("nome").value.trim();
  let tel = document.getElementById("tel").value.trim();
  let tutor = document.getElementById("tutor").value.trim();

  if (!tag || !nome || !tel) {
    alert("Preencha todos os campos");
    return;
  }

  document.getElementById("status").innerText = "🔍 Validando TAG...";

  let baseApi = "https://script.google.com/macros/s/AKfycbx9rrb6f3E__M34HaZaY-HASOqwPDJuY2xuNW8gccA0wBYBdRF5GWPvd5ZQlxxx9OyO/exec";

  let res = await fetch(baseApi + "?id=" + tag);
  let status = await res.text();

  if (status == "NAO_EXISTE") {
    document.getElementById("status").innerText = "❌ TAG inválida";
    return;
  }

  if (status == "USADO") {
    document.getElementById("status").innerText = "⚠️ TAG já utilizada";
    return;
  }

  document.getElementById("status").innerText = "💾 Ativando TAG...";

  let dataHora = formatarDataHora();

  let ativacao = await fetch(
    baseApi +
    "?id=" + tag +
    "&nome=" + encodeURIComponent(nome) +
    "&tel=" + tel +
    "&tutor=" + encodeURIComponent(tutor) +
    "&hora=" + encodeURIComponent(dataHora)
  );

  let resultado = await ativacao.text();

  // 🔥 valida resposta com token
  if (!resultado.startsWith("ATIVADO")) {
    document.getElementById("status").innerText = "Erro ao ativar";
    return;
  }

  // 🔐 extrai token
  let token = resultado.split("|")[1];

  document.getElementById("status").innerText = "✅ TAG ativada com sucesso";
  document.getElementById("hora").innerText = "🕒 Ativado em: " + dataHora;

  let base = "https://pet-nfc-pi.vercel.app/";

  // 🔐 link criptografado
  linkGerado = base + "?t=" + token;

  // 🔒 mostra truncado
  document.getElementById("link").innerText = truncarLink(linkGerado);
}

function copiar() {
  if (!linkGerado) return alert("Gere primeiro");
  navigator.clipboard.writeText(linkGerado);
  alert("Link copiado!");
}

function testar() {
  if (!linkGerado) return alert("Gere primeiro");
  window.open(linkGerado);
}

</script>

</body>
</html>
