<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PetNex ID • Gerador</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial;
  background: radial-gradient(circle at top, #1c3b34, #0b1c22 70%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 30px;
  border-radius: 22px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  color: white;
}
input {
  width: 90%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
}
button {
  width: 90%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
.gerar { background: #0072ff; color:white; }
.copiar { background: #00ffb3; }
.testar { background: #ffb88c; }

#status { margin-top: 10px; font-weight: bold; }
#hora { font-size: 12px; color: #aaa; }
#link { font-size: 12px; color: #ccc; margin-top: 10px; }
</style>
</head>

<body>

<div class="card">

<h2>🐶 Gerador NFC 🐶</h2>

<input id="tag" placeholder="Código da TAG">
<input id="nome" placeholder="Nome do pet">
<input id="tel" placeholder="WhatsApp">
<input id="tutor" placeholder="Tutor">

<button class="gerar" onclick="gerar()">Gerar</button>
<button class="copiar" onclick="copiar()">Copiar</button>
<button class="testar" onclick="testar()">Testar</button>

<p id="status"></p>
<p id="hora"></p>
<p id="link"></p>

</div>

<script>

let linkGerado = "";

function limpar(txt) {
  return txt.toUpperCase();
}

function truncar(url) {
  return url.substring(0, 25) + "..." + url.substring(url.length - 10);
}

async function gerar() {

  const statusUI = document.getElementById("status");

  let tag = document.getElementById("tag").value.trim().toUpperCase();
  let nome = document.getElementById("nome").value.trim();
  let tel = document.getElementById("tel").value.trim();
  let tutor = document.getElementById("tutor").value.trim();

  if (!tag || !nome || !tel) {
    alert("Preencha tudo");
    return;
  }

  const API = "https://script.google.com/macros/s/AKfycbww_8i3tmo0RTu_q5FCvQl1Q5O5-NDt4yAQ9pigX9Hsb-WCzO4x6qJFCoh3JwB5F3I8/exec";

  statusUI.innerText = "Verificando...";

  let res = await fetch(API + "?id=" + tag);
  let status = limpar(await res.text());

  console.log("STATUS RAW:", status);

  // 🔥 VALIDAÇÃO ROBUSTA
  if (status.includes("NAO_EXISTE")) {
    statusUI.innerText = "❌ TAG NÃO EXISTE";
    return;
  }

  if (status.includes("USADO")) {
    statusUI.innerText = "🚫 TAG USADA";
    return;
  }

  if (!status.includes("LIVRE")) {
    statusUI.innerText = "❌ ERRO NA VALIDAÇÃO";
    return;
  }

  statusUI.innerText = "Ativando...";

  let ativacao = await fetch(
    API +
    "?id=" + tag +
    "&nome=" + nome +
    "&tel=" + tel +
    "&tutor=" + tutor
  );

  let resultado = limpar(await ativacao.text());

  console.log("ATIVACAO RAW:", resultado);

  if (!resultado.includes("ATIVADO")) {
    statusUI.innerText = "❌ Falha ao ativar";
    return;
  }

  linkGerado = "https://pet-nfc-pi.vercel.app/?id=" + tag;

  statusUI.innerText = "✅ Ativado com sucesso";
  document.getElementById("hora").innerText = new Date().toLocaleString();
  document.getElementById("link").innerText = truncar(linkGerado);
}

function copiar() {
  navigator.clipboard.writeText(linkGerado);
  alert("Copiado!");
}

function testar() {
  window.open(linkGerado);
}

</script>

</body>
</html>
