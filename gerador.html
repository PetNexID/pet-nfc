<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetNex ID • Gerador</title>

<style>

/* FUNDO PREMIUM */
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at top, #1c3b34, #0b1c22 70%);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 30px;
  border-radius: 22px;
  width: 90%;
  max-width: 380px;
  text-align: center;
  color: white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* LOGO */
.Logo {
  width: 160px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 10px rgba(0,255,180,0.3));
}

/* INPUT */
input {
  width: 90%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 15px;
}

/* BOTÕES */
button {
  width: 90%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
}

.gerar { background: linear-gradient(45deg,#00c6ff,#0072ff); color:white; }
.copiar { background: linear-gradient(45deg,#00b09b,#00ffb3); }
.testar { background: linear-gradient(45deg,#ff7e5f,#ffb88c); }

/* LINK */
#link {
  margin-top: 15px;
  font-size: 12px;
  word-break: break-all;
  color: #ccc;
}

/* RODAPÉ */
.footer {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.6;
}

</style>

</head>

<body>

<div class="card">

<img src="Logo.png" class="Logo">

<h2>🐶 Gerador NFC 🐶</h2>

<input id="nome" placeholder="Nome do pet">
<input id="tel" placeholder="WhatsApp (5584...)">
<input id="tutor" placeholder="Nome do tutor">

<button class="gerar" onclick="gerar()">Gerar Link</button>
<button class="copiar" onclick="copiar()">Copiar</button>
<button class="testar" onclick="testar()">Testar</button>

<p id="link"></p>

<div class="footer">PetNex ID • Tecnologia para pets</div>

</div>

<script>

let linkGerado = "";

function gerar() {

  let nome = document.getElementById("nome").value.trim();
  let tel = document.getElementById("tel").value.trim();
  let tutor = document.getElementById("tutor").value.trim();

  if (!nome || !tel) {
    alert("Preencha nome e telefone");
    return;
  }

  let base = "https://pet-nfc-pi.vercel.app/";

  linkGerado = base +
    "?nome=" + encodeURIComponent(nome) +
    "&tel=" + tel +
    "&tutor=" + encodeURIComponent(tutor);

  document.getElementById("link").innerText = linkGerado;
}

function copiar() {
  if (!linkGerado) return alert("Gere primeiro");
  navigator.clipboard.writeText(linkGerado);
  alert("Link copiado!");
}

function testar() {
  if (!linkGerado) return alert("Gere primeiro");
  window.open(linkGerado);
}

</script>

</body>
</html>
