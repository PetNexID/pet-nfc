<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f2027;
  color: #fff;
  padding: 20px;
}

.box {
  background: #203a43;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

input {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<script>
const senha = prompt("Digite a senha:");
if (senha !== "123456") {
  alert("Acesso negado");
  window.location.href = "/";
}
</script>

<h2>📊 Painel de Ativações</h2>

<!-- FILTROS -->
<label>Data Inicial:</label>
<input type="date" id="inicio">

<label>Data Final:</label>
<input type="date" id="fim">

<br>

<label>Buscar TAG:</label>
<input type="text" id="buscaTag" placeholder="Ex: PET010" oninput="filtrarLocal()">

<button onclick="carregar()">🔎 Filtrar</button>
<button onclick="exportar()">📥 Exportar Excel</button>

<hr>

<h3>Total de Ativações: <span id="total">0</span></h3>

<canvas id="grafico"></canvas>

<hr>

<h3>🏆 Ranking de Tutores</h3>
<div id="ranking"></div>

<hr>

<h3>📋 Lista de Ativações</h3>
<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://wbinbiqurgbqfimjuyvh.supabase.co",
  "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF"
);

let chart;
let dados = [];
let dadosFiltrados = [];

// 🔥 CARREGAR DO BANCO
async function carregar() {

  let query = supabaseClient
    .from("pets")
    .select("*")
    .eq("ativo", true);

  const inicio = document.getElementById("inicio").value;
  const fim = document.getElementById("fim").value;

  if (inicio) query = query.gte("data_ativacao", inicio);
  if (fim) query = query.lte("data_ativacao", fim + "T23:59:59");

  const { data } = await query;

  dados = data || [];
  dadosFiltrados = [...dados];

  aplicarRender();
}

// 🔎 FILTRO LOCAL (BUSCA TAG)
function filtrarLocal() {

  const termo = document.getElementById("buscaTag").value.toLowerCase();

  dadosFiltrados = dados.filter(p =>
    (p.codigo_tag || "").toLowerCase().includes(termo)
  );

  aplicarRender();
}

// 🎯 RENDER GERAL
function aplicarRender() {

  document.getElementById("total").innerText = dadosFiltrados.length;

  // 📊 GRÁFICO
  const grupo = {};

  dadosFiltrados.forEach(p => {
    if (!p.data_ativacao) return;
    const dia = new Date(p.data_ativacao).toLocaleDateString();
    grupo[dia] = (grupo[dia] || 0) + 1;
  });

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels: Object.keys(grupo),
      datasets: [{
        label: "Ativações",
        data: Object.values(grupo)
      }]
    }
  });

  // 🏆 RANKING
  const ranking = {};

  dadosFiltrados.forEach(p => {
    if (!p.nome_tutor) return;
    ranking[p.nome_tutor] = (ranking[p.nome_tutor] || 0) + 1;
  });

  let htmlRank = "";

  Object.entries(ranking)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5)
    .forEach(([nome, total]) => {
      htmlRank += `<div class="box">👤 ${nome} - ${total}</div>`;
    });

  document.getElementById("ranking").innerHTML = htmlRank || "Sem dados";

  // 📋 LISTA
  let html = "";

  dadosFiltrados.forEach(p => {
    html += `
      <div class="box">
        🏷️ TAG: ${p.codigo_tag || "-"} <br>
        🐶 ${p.nome_pet || "-"} <br>
        👤 ${p.nome_tutor || "-"} <br>
        📞 ${p.telefone || "-"} <br>
        📅 ${p.data_ativacao ? new Date(p.data_ativacao).toLocaleString() : "-"}
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html || "Nenhum resultado";
}

// 📥 EXPORTAR
function exportar() {

  if (!dadosFiltrados.length) {
    alert("Sem dados");
    return;
  }

  const dadosFormatados = dadosFiltrados.map(p => ({
    TAG: p.codigo_tag,
    Pet: p.nome_pet,
    Tutor: p.nome_tutor,
    Telefone: p.telefone,
    Data: p.data_ativacao ? new Date(p.data_ativacao).toLocaleString() : "-"
  }));

  const ws = XLSX.utils.json_to_sheet(dadosFormatados);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Ativacoes");

  XLSX.writeFile(wb, "ativacoes.xlsx");
}

// 🚀 AUTO LOAD
carregar();
</script>

</body>
</html>
