<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ativação Premium</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b1c22;
  color:white;
  font-family:Arial;
}

.container {
  width:90%;
  max-width:400px;
  text-align:center;
}

input, button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
}

input {
  background:#132f38;
  color:white;
}

button {
  background:#00c853;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#00e676;
}
</style>
</head>

<body>

<div class="container">

<h2 id="titulo">🔄 Verificando TAG...</h2>
<p id="status">Aguarde...</p>

<div id="form" style="display:none;">
  <input type="text" id="nome" placeholder="Nome do pet">
  <input type="tel" id="tel" placeholder="WhatsApp">
  <input type="text" id="tutor" placeholder="Tutor (opcional)">
  <button onclick="ativar()">Ativar TAG</button>
</div>

</div>

<script>

const API = "COLE_AQUI_SUA_API";
const id = new URLSearchParams(window.location.search).get("id");

async function init() {

  if (!id) {
    setStatus("ID inválido");
    return;
  }

  const res = await fetch(`${API}?id=${id}`);
  let raw = (await res.text()).trim();

  console.log("RAW:", raw);

  // 🔥 TAG JÁ ATIVA
  if (raw.startsWith("{")) {
    setTitulo("TAG já ativada");
    setStatus("Redirecionando...");
    redirect();
    return;
  }

  const status = raw.toUpperCase();

  if (status === "LIVRE") {
    setTitulo("🔒 Ativação Premium");
    setStatus("Preencha os dados para ativar");
    document.getElementById("form").style.display = "block";
    return;
  }

  if (status === "NAO_EXISTE") {
    setStatus("TAG não existe");
    return;
  }

  setStatus("Erro: " + raw);
}

async function ativar() {

  const nome = document.getElementById("nome").value.trim();
  const tel = document.getElementById("tel").value.trim();
  const tutor = document.getElementById("tutor").value.trim();

  if (!nome || !tel) {
    setStatus("Preencha nome e WhatsApp");
    return;
  }

  setStatus("Ativando...");

  const res = await fetch(
    `${API}?id=${encodeURIComponent(id)}&nome=${encodeURIComponent(nome)}&tel=${encodeURIComponent(tel)}&tutor=${encodeURIComponent(tutor)}`
  );

  let result = (await res.text()).trim().toUpperCase();

  if (!result.includes("ATIVADO")) {
    setStatus("Erro ao ativar");
    return;
  }

  setStatus("Ativado com sucesso!");
  redirect(1500);
}

function redirect(delay = 2000) {
  setTimeout(() => {
    window.location.href = `/?id=${id}`;
  }, delay);
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function setTitulo(msg) {
  document.getElementById("titulo").innerText = msg;
}

init();

</script>

</body>
</html>
