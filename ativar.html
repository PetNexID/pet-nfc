<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ativar TAG</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

.card {
  max-width: 400px;
  margin: 60px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

input {
  width: 90%;
  margin: 10px;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  width: 90%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #00c6ff;
  color: white;
  font-size: 16px;
}

.erro {
  background: red;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Ativação da TAG</h2>

<div id="mensagem"></div>

<div id="formulario" style="display:none;">
  <input id="pet" placeholder="Nome do Pet">
  <input id="tutor" placeholder="Nome do Tutor">
  <input id="telefone" placeholder="WhatsApp">
  <button onclick="ativar()">Ativar TAG</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const codigo = urlParams.get('codigo');

const supabaseClient = supabase.createClient(
  "https://wbinbiqurgbqfimjuyvh.supabase.co",
  "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF"
);

async function verificar() {

  const { data, error } = await supabaseClient
    .from('pets')
    .select('*')
    .eq('codigo_tag', codigo)
    .single();

  // ❌ TAG NÃO EXISTE
  if (error || !data) {
    document.getElementById("mensagem").innerHTML =
      "<div class='erro'>TAG NÃO CADASTRADA</div>";
    return;
  }

  // 🔒 TAG JÁ USADA
  if (data.status === "USADA") {
    document.getElementById("mensagem").innerHTML =
      "<div class='erro'>⚠️ Esta TAG já foi ativada</div>";
    return;
  }

  // ✅ TAG LIVRE
  document.getElementById("mensagem").innerHTML =
    "<p>Preencha os dados para ativar</p>";

  document.getElementById("formulario").style.display = "block";
}

async function ativar() {

  const nomePet = document.getElementById("pet").value;
  const nomeTutor = document.getElementById("tutor").value;
  const telefone = document.getElementById("telefone").value;

  if (!nomePet || !nomeTutor || !telefone) {
    alert("Preencha todos os campos");
    return;
  }

  await supabaseClient
    .from('pets')
    .update({
      nome_pet: nomePet,
      nome_tutor: nomeTutor,
      telefone: telefone,
      status: "USADA",
      data_cadastro: new Date()
    })
    .eq('codigo_tag', codigo);

  // 🚀 REDIRECIONA PARA O PET
  window.location.href = "pet.html?codigo=" + codigo;
}

verificar();
</script>

</body>
</html>
