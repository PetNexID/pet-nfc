<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ativando TAG...</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b1c22;
  color:white;
  font-family:Arial;
  text-align:center;
}
</style>
</head>

<body>

<div>
<h2>🔄 Ativando TAG...</h2>
<p id="status">Aguarde...</p>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbww_8i3tmo0RTu_q5FCvQl1Q5O5-NDt4yAQ9pigX9Hsb-WCzO4x6qJFCoh3JwB5F3I8/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function ativarAutomatico() {

  if (!id) {
    document.getElementById("status").innerText = "ID inválido";
    return;
  }

  // 🔎 valida
  let res = await fetch(API + "?id=" + id);
  let status = (await res.text()).replace(/\s/g,"").toUpperCase();

  if (status === "NAO_EXISTE") {
    document.getElementById("status").innerText = "TAG não existe";
    return;
  }

  if (status === "USADO") {
    // 🔥 já ativa → vai direto pro pet
    window.location.href = "/?id=" + id;
    return;
  }

  // 🔥 pega dados automaticamente
  let nome = prompt("Nome do pet:");
  let tel = prompt("WhatsApp:");
  let tutor = prompt("Tutor:");

  if (!nome || !tel) {
    document.getElementById("status").innerText = "Dados incompletos";
    return;
  }

  // 🚀 ativa
  let ativacao = await fetch(
    API +
    "?id=" + id +
    "&nome=" + encodeURIComponent(nome) +
    "&tel=" + tel +
    "&tutor=" + encodeURIComponent(tutor)
  );

  let resultado = (await ativacao.text()).replace(/\s/g,"");

  if (resultado !== "ATIVADO") {
    document.getElementById("status").innerText = "Erro ao ativar";
    return;
  }

  // 🔥 redireciona automático
  window.location.href = "/?id=" + id;
}

ativarAutomatico();

</script>

</body>
</html>
