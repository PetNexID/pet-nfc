<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativação da TAG</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

.card {
  max-width: 400px;
  margin: 50px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
}

.logo {
  width: 200px;
}

input {
  width: 90%;
  margin: 10px;
  padding: 14px;
  border-radius: 10px;
  border: none;
}

button {
  width: 90%;
  padding: 14px;
  border-radius: 10px;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
  border: none;
}

.msg {
  margin: 15px;
  padding: 12px;
  border-radius: 10px;
  font-weight: bold;
}

.erro { background: red; }
.sucesso { background: green; }
</style>
</head>

<body>

<div class="card">

<img src="Logo.png" class="logo">

<h2>🐶 Ativação da TAG 🐶</h2>

<div id="mensagem"></div>

<div id="formulario" style="display:none;">
  <input id="pet" placeholder="Nome do Pet">
  <input id="tutor" placeholder="Nome do Tutor">
  <input id="telefone" placeholder="WhatsApp">
  <button onclick="ativar()">Ativar TAG</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const codigo = urlParams.get('codigo');

const supabaseClient = supabase.createClient(
  "https://wbinbiqurgbqfimjuyvh.supabase.co",
  "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF"
);


// 🔎 VERIFICA STATUS
async function verificar() {

  const { data, error } = await supabaseClient
    .from('pets')
    .select('*')
    .eq('codigo_tag', codigo)
    .single();

  if (error || !data) {
    mostrarErro("TAG NÃO CADASTRADA");
    return;
  }

  // 🔴 USADA → VAI DIRETO
  if (data.status === "USADA") {
    mostrarSucesso("✅ TAG JÁ ATIVADA");

    setTimeout(() => {
      window.location.href = "pet.html?codigo=" + codigo;
    }, 1200);

    return;
  }

  // 🟢 LIVRE → FORMULÁRIO
  document.getElementById("mensagem").innerHTML =
    "<div class='msg'>Preencha para ativar</div>";

  document.getElementById("formulario").style.display = "block";
}


// 🚀 ATIVAÇÃO COM CONFIRMAÇÃO REAL
async function ativar() {

  const nomePet = document.getElementById("pet").value;
  const nomeTutor = document.getElementById("tutor").value;
  const telefone = document.getElementById("telefone").value;

  if (!nomePet || !nomeTutor || !telefone) {
    alert("Preencha todos os campos");
    return;
  }

  // 🔥 ATIVA SOMENTE SE LIVRE
  const { data } = await supabaseClient
    .from('pets')
    .update({
      nome_pet: nomePet,
      nome_tutor: nomeTutor,
      telefone: telefone,
      status: "USADA",
      data_cadastro: new Date()
    })
    .eq('codigo_tag', codigo)
    .eq('status', 'LIVRE')
    .select();

  // 🔒 JÁ FOI ATIVADA
  if (!data || data.length === 0) {
    mostrarErro("⚠️ TAG já foi ativada");

    setTimeout(() => {
      window.location.href = "pet.html?codigo=" + codigo;
    }, 1200);

    return;
  }

  mostrarSucesso("🚀 Ativando...");

  // 🔥 CONFIRMAÇÃO REAL NO BANCO
  await confirmarBanco();

  // 🔥 SÓ AGORA REDIRECIONA
  window.location.href = "pet.html?codigo=" + codigo;
}


// 🔥 ESPERA BANCO ATUALIZAR
async function confirmarBanco() {

  let tentativas = 0;

  while (tentativas < 6) {

    const res = await supabaseClient
      .from('pets')
      .select('status')
      .eq('codigo_tag', codigo)
      .single();

    if (res.data && res.data.status === "USADA") {
      return;
    }

    await new Promise(r => setTimeout(r, 300));
    tentativas++;
  }
}


// UI helpers
function mostrarErro(msg) {
  document.getElementById("mensagem").innerHTML =
    "<div class='msg erro'>" + msg + "</div>";
}

function mostrarSucesso(msg) {
  document.getElementById("mensagem").innerHTML =
    "<div class='msg sucesso'>" + msg + "</div>";
}

verificar();
</script>

</body>
</html>
