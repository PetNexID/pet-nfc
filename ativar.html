<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Ativação da TAG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1f3a44;
      color: #fff;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #2e5561;
      padding: 30px;
      border-radius: 12px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🐶 Ativação da TAG</h1>
    <p id="status">Verificando TAG...</p>
  </div>

  <script>
    const SUPABASE_URL = "https://SEU-PROJETO.supabase.co";
    const SUPABASE_KEY = "SUA_ANON_KEY";

    async function verificarTag() {
      const params = new URLSearchParams(window.location.search);
      const codigo = params.get("codigo");

      if (!codigo) {
        return mostrarErro("Código inválido");
      }

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/pets?codigo=eq.${codigo}&limit=1`,
          {
            method: "GET",
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": `Bearer ${SUPABASE_KEY}`,
              "Content-Type": "application/json"
            }
          }
        );

        if (!response.ok) {
          throw new Error("Erro na API");
        }

        const data = await response.json();

        console.log("RESPOSTA:", data);

        // 🔥 CORREÇÃO PRINCIPAL: evita travamento
        if (!data || data.length === 0) {
          return mostrarErro("❌ TAG não encontrada");
        }

        const pet = data[0];

        // 🔥 mantém sua lógica original
        if (pet.status === "ATIVA") {
          atualizarStatus("🔎 TAG ativa encontrada...");
          setTimeout(() => {
            window.location.href = `/pet.html?codigo=${codigo}`;
          }, 1000);
        } else {
          atualizarStatus("⚙️ TAG disponível para ativação...");
          setTimeout(() => {
            window.location.href = `/ativar-form.html?codigo=${codigo}`;
          }, 1000);
        }

      } catch (error) {
        console.error("ERRO:", error);
        mostrarErro("⚠️ Erro ao verificar TAG");
      }
    }

    function atualizarStatus(msg) {
      document.getElementById("status").innerText = msg;
    }

    function mostrarErro(msg) {
      document.getElementById("status").innerText = msg;
    }

    verificarTag();
  </script>

</body>
</html>
