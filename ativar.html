<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativação da TAG</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

.card {
  max-width: 400px;
  margin: 60px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
}

.logo {
  width: 200px;
}

label {
  display: block;
  text-align: left;
  width: 90%;
  margin: 10px auto 5px;
  font-size: 13px;
  opacity: 0.8;
}

input {
  width: 90%;
  margin: 5px auto 10px;
  padding: 14px;
  border-radius: 10px;
  border: none;
  display: block;
}

button {
  width: 90%;
  padding: 14px;
  border-radius: 10px;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
  border: none;
  cursor: pointer;
}

.msg {
  margin: 15px;
  padding: 12px;
  border-radius: 10px;
  font-weight: bold;
}

.erro { background: #ff2e2e; }
.sucesso { background: #00c851; }
</style>
</head>

<body>

<div class="card">

<img src="Logo.png" class="logo">

<h2>🐶 Ativação da TAG 🐶</h2>

<div id="mensagem">Verificando TAG...</div>

<div id="formulario" style="display:none;">

  <label>Nome do Pet</label>
  <input id="pet" placeholder="Ex: Rex">

  <label>Nome do Tutor</label>
  <input id="tutor" placeholder="Ex: João Silva">

  <label>WhatsApp</label>
  <input id="telefone" placeholder="(85) 99999-9999">

  <button onclick="ativar()">Ativar TAG</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const codigo = urlParams.get('codigo');

const supabaseClient = supabase.createClient(
  "https://wbinbiqurgbqfimjuyvh.supabase.co",
  "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF"
);


// 🔎 VERIFICAR STATUS
async function verificar() {

  const { data, error } = await supabaseClient
    .from('pets')
    .select('*')
    .eq('codigo_tag', codigo)
    .single();

  if (error) {
    console.error(error);
    mostrarErro("Erro ao consultar TAG");
    return;
  }

  if (data.status === "USADA") {
    mostrarErro("⚠️ TAG JÁ CADASTRADA");
    return;
  }

  document.getElementById("mensagem").innerHTML =
    "<div class='msg'>Preencha os dados para ativar</div>";

  document.getElementById("formulario").style.display = "block";
}


// 🔥 MÁSCARA WHATSAPP
const inputTel = document.getElementById("telefone");

inputTel.addEventListener("input", function(e) {

  let v = e.target.value.replace(/\D/g, "");

  if (v.length > 11) v = v.slice(0,11);

  if (v.length > 2) {
    v = "(" + v.slice(0,2) + ") " + v.slice(2);
  }

  if (v.length > 10) {
    v = v.slice(0,10) + "-" + v.slice(10);
  }

  e.target.value = v;
});


// 🔥 VALIDAÇÃO + NORMALIZAÇÃO
function formatarTelefone(numero) {

  numero = numero.replace(/\D/g, "");

  // adiciona código do Brasil
  //if (!numero.startsWith("55")) {
  //  numero = "55" + numero;
 // }

 // const regex = /^55\d{2}9\d{8}$/;

 // if (!regex.test(numero)) return false;

  //return numero;
//}
  function formatarTelefone(numero) {

  // remove tudo que não for número
  numero = numero.replace(/\D/g, "");

  // remove qualquer 55 duplicado no início
  numero = numero.replace(/^55+/, "");

  // agora adiciona 55 corretamente
  numero = "55" + numero;

  // valida padrão BR
  const regex = /^55\d{2}9\d{8}$/;

  if (!regex.test(numero)) return false;

  return numero;
}


// 🚀 ATIVAR
async function ativar() {

  const nomePet = document.getElementById("pet").value;
  const nomeTutor = document.getElementById("tutor").value;
  let telefone = document.getElementById("telefone").value;

  if (!nomePet || !nomeTutor || !telefone) {
    alert("Preencha todos os campos");
    return;
  }

  telefone = formatarTelefone(telefone);

  if (!telefone) {
    alert("Digite um WhatsApp válido com DDD (ex: 85999999999)");
    return;
  }

  const { data, error } = await supabaseClient
    .from('pets')
    .update({
      nome_pet: nomePet,
      nome_tutor: nomeTutor,
      telefone: telefone,
      status: "USADA",
      data_cadastro: new Date()
    })
    .eq('codigo_tag', codigo)
    .select();

  if (error) {
    console.error(error);
    mostrarErro("Erro ao salvar no banco");
    return;
  }

  if (!data || data.length === 0) {
    mostrarErro("⚠️ Falha ao atualizar TAG");
    return;
  }

  mostrarSucesso("✅ TAG CADASTRADA COM SUCESSO");

  document.getElementById("formulario").style.display = "none";
}


// UI
function mostrarErro(msg) {
  document.getElementById("mensagem").innerHTML =
    "<div class='msg erro'>" + msg + "</div>";
}

function mostrarSucesso(msg) {
  document.getElementById("mensagem").innerHTML =
    "<div class='msg sucesso'>" + msg + "</div>";
}


verificar();
</script>

</body>
</html>
