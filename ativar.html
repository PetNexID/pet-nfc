<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Ativação da TAG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1f3a44;
      color: #fff;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #2e5561;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 10px;
      font-size: 14px;
      color: #cfd8dc;
    }

    input {
      display: block;
      width: 100%;
      margin: 5px 0 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 12px;
      background: #00c853;
      color: #fff;
      border: none;
      border-radius: 5px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🐶 Ativação da TAG</h1>
    <p id="status">Verificando TAG...</p>

    <div id="form" style="display:none;">
      
      <label>Nome do Pet</label>
      <input type="text" id="nome_pet" placeholder="Ex: Rex">

      <label>Nome do Tutor</label>
      <input type="text" id="nome_tutor" placeholder="Ex: João Silva">

      <label>WhatsApp para contato</label>
      <input type="text" id="telefone" placeholder="(85) 99999-9999" oninput="mascaraTelefone(this)">

      <button onclick="ativar()">Ativar TAG</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://wbinbiqurgbqfimjuyvh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("codigo");

    async function verificarTag() {
      if (!codigo) return mostrarErro("Código inválido");

      try {
        const { data, error } = await supabaseClient
          .from("pets")
          .select("*")
          .eq("codigo_tag", codigo)
          .limit(1);

        if (error) throw error;

        if (!data || data.length === 0) {
          return mostrarErro("❌ TAG não encontrada");
        }

        const pet = data[0];

        if (pet.ativo === true) {
          atualizarStatus("🔎 TAG já ativa!");
          setTimeout(() => {
            window.location.href = `/pet.html?codigo=${codigo}`;
          }, 1000);
        } else {
          atualizarStatus("⚙️ Preencha os dados para ativar");
          document.getElementById("form").style.display = "block";
        }

      } catch (err) {
        console.error(err);
        mostrarErro("⚠️ Erro ao verificar TAG");
      }
    }

    // 🔥 MÁSCARA DE TELEFONE
    function mascaraTelefone(input) {
      let v = input.value.replace(/\D/g, "");

      if (v.length > 11) v = v.slice(0, 11);

      if (v.length > 10) {
        input.value = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
      } else if (v.length > 6) {
        input.value = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, "($1) $2-$3");
      } else if (v.length > 2) {
        input.value = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
      } else {
        input.value = v;
      }
    }

    // 🔥 CONVERTE PARA PADRÃO 5585999999999
    function formatarNumero(numero) {
      let v = numero.replace(/\D/g, "");
      return "55" + v;
    }

    async function ativar() {
      const nome_pet = document.getElementById("nome_pet").value;
      const nome_tutor = document.getElementById("nome_tutor").value;
      const telefone_input = document.getElementById("telefone").value;

      if (!nome_pet || !nome_tutor || !telefone_input) {
        return atualizarStatus("Preencha todos os campos");
      }

      const telefone = formatarNumero(telefone_input);

      try {
        const { error } = await supabaseClient
          .from("pets")
          .update({
            nome_pet,
            nome_tutor,
            telefone,
            ativo: true
          })
          .eq("codigo_tag", codigo);

        if (error) throw error;

        atualizarStatus("✅ TAG ativada com sucesso!");

        setTimeout(() => {
          window.location.href = `/pet.html?codigo=${codigo}`;
        }, 1500);

      } catch (err) {
        console.error(err);
        atualizarStatus("❌ Erro ao ativar");
      }
    }

    function atualizarStatus(msg) {
      document.getElementById("status").innerText = msg;
    }

    function mostrarErro(msg) {
      document.getElementById("status").innerText = msg;
    }

    verificarTag();
  </script>

</body>
</html>
