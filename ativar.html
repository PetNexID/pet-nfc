<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativar TAG</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

.card {
  max-width: 400px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

.logo {
  width: 180px;
  margin-bottom: 10px;
}

input {
  width: 90%;
  margin: 10px;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  width: 90%;
  margin: 10px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.btn-ativar {
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
}

.msg {
  margin: 15px;
  padding: 10px;
  border-radius: 10px;
}

.erro {
  background: #ff2e2e;
}

.sucesso {
  background: #00c851;
}
</style>
</head>

<body>

<div class="card">

<img src="Logo.png" class="logo">

<h2>🐶 Ativação da TAG</h2>

<div id="mensagem"></div>

<div id="formulario" style="display:none;">
  <input id="pet" placeholder="Nome do Pet">
  <input id="tutor" placeholder="Nome do Tutor">
  <input id="telefone" placeholder="WhatsApp">
  <button class="btn-ativar" onclick="ativar()">Ativar TAG</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const codigo = urlParams.get('codigo');

const supabaseClient = supabase.createClient(
  "https://wbinbiqurgbqfimjuyvh.supabase.co",
  "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF"
);

async function verificar() {

  const { data, error } = await supabaseClient
    .from('pets')
    .select('*')
    .eq('codigo_tag', codigo)
    .single();

  // ❌ NÃO EXISTE
  if (error || !data) {
    document.getElementById("mensagem").innerHTML =
      "<div class='msg erro'>TAG NÃO CADASTRADA</div>";
    return;
  }

  // 🔒 JÁ USADA
  if (data.status === "USADA") {
    document.getElementById("mensagem").innerHTML =
      "<div class='msg erro'>⚠️ Esta TAG já foi ativada</div>";
    return;
  }

  // ✅ LIBERADA
  document.getElementById("mensagem").innerHTML =
    "<div class='msg'>Preencha os dados para ativar</div>";

  document.getElementById("formulario").style.display = "block";
}

async function ativar() {

  const nomePet = document.getElementById("pet").value;
  const nomeTutor = document.getElementById("tutor").value;
  const telefone = document.getElementById("telefone").value;

  if (!nomePet || !nomeTutor || !telefone) {
    alert("Preencha todos os campos");
    return;
  }

  const { error } = await supabaseClient
    .from('pets')
    .update({
      nome_pet: nomePet,
      nome_tutor: nomeTutor,
      telefone: telefone,
      status: "USADA",
      data_cadastro: new Date()
    })
    .eq('codigo_tag', codigo);

  if (error) {
    alert("Erro ao ativar");
    return;
  }

  // ✅ CONFIRMAÇÃO VISUAL
  document.getElementById("mensagem").innerHTML =
    "<div class='msg sucesso'>TAG ATIVADA COM SUCESSO 🚀</div>";

  // ⏳ REDIRECIONA AUTOMATICAMENTE
  setTimeout(() => {
    window.location.href = "pet.html?codigo=" + codigo;
  }, 1500);
}

verificar();
</script>

</body>
</html>
