<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ativação da TAG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #1f3a44;
  color: #fff;
  text-align: center;
  padding: 40px;
}

.box {
  background: #2e5561;
  padding: 30px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 95%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #00c853;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  background: #777;
}

.loading {
  opacity: 0.6;
}

.msg {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box">

<h2>🐶 Ativação da TAG</h2>

<div id="status">Verificando TAG...</div>

<form id="form" style="display:none;">
  
  <input type="text" id="nome_pet" placeholder="Nome do Pet">
  <input type="text" id="nome_tutor" placeholder="Nome do Tutor">
  <input type="text" id="telefone" placeholder="WhatsApp (85 99999-9999)">
  
  <button type="submit" id="btn">Ativar TAG</button>

</form>

<div id="mensagem" class="msg"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const codigo = urlParams.get("codigo");

const supabaseClient = supabase.createClient(
  "https://wbinbiqurgbqfimjuyvh.supabase.co",
  "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF"
);

const statusEl = document.getElementById("status");
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const msg = document.getElementById("mensagem");

// 🔒 ANTIFRAUDE: evitar múltiplos envios
let enviando = false;

// 🚀 VERIFICAR TAG
async function verificar() {

  const { data } = await supabaseClient
    .from("pets")
    .select("*")
    .eq("codigo_tag", codigo)
    .single();

  if (!data) {
    statusEl.innerText = "❌ TAG inválida";
    return;
  }

  // 🔒 JÁ ATIVADA
  if (data.ativo === true) {
    statusEl.innerText = "🚫 TAG já ativada";
    form.style.display = "none";
    return;
  }

  // ✅ LIBERADA
  statusEl.innerText = "✅ TAG disponível";
  form.style.display = "block";
}

// 🔥 ATIVAR
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (enviando) return;

  const nome_pet = document.getElementById("nome_pet").value.trim();
  const nome_tutor = document.getElementById("nome_tutor").value.trim();
  let telefone = document.getElementById("telefone").value.replace(/\D/g, "");

  // 🧠 VALIDAÇÃO
  if (!nome_pet || !nome_tutor) {
    msg.innerText = "⚠️ Preencha todos os campos";
    return;
  }

  if (telefone.length < 11) {
    msg.innerText = "⚠️ WhatsApp inválido";
    return;
  }

  telefone = "55" + telefone;

  // 🔒 trava envio
  enviando = true;
  btn.disabled = true;
  btn.innerText = "Ativando...";
  btn.classList.add("loading");

  const { error } = await supabaseClient
    .from("pets")
    .update({
      nome_pet,
      nome_tutor,
      telefone,
      ativo: true,
      data_ativacao: new Date().toISOString()
    })
    .eq("codigo_tag", codigo);

  if (error) {
    msg.innerText = "❌ Erro ao ativar";
    btn.disabled = false;
    btn.innerText = "Ativar TAG";
    enviando = false;
    return;
  }

  msg.innerText = "✅ TAG ativada com sucesso";

  setTimeout(() => {
    window.location.href = `/pet.html?codigo=${codigo}`;
  }, 1500);

});

// 🚀 START
verificar();
</script>

</body>
</html>
