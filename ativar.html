<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ativando TAG...</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b1c22;
  color:white;
  font-family:Arial;
  text-align:center;
}
</style>
</head>

<body>

<div>
<h2 id="titulo">🔄 Ativando TAG...</h2>
<p id="status">Aguarde...</p>
</div>

<script>

const API = "COLE_AQUI_SUA_URL_NOVA";

const params = new URLSearchParams(window.location.search);
const id = (params.get("id") || "").toUpperCase().trim();

async function ativarAutomatico() {

  if (!id) {
    setStatus("ID inválido");
    return;
  }

  try {

    // 🔎 CONSULTA
    let res = await fetch(API + "?id=" + id);
    let raw = await res.text();

    console.log("RAW:", raw);

    // 🔥 Se vier JSON → já está ativa
    if (raw.startsWith("{")) {

      setTitulo("TAG já ativada");
      setStatus("🐾 Esta TAG já está em uso. Redirecionando...");

      setTimeout(() => {
        window.location.href = "/?id=" + id;
      }, 2000);

      return;
    }

    let status = raw.trim().toUpperCase();

    // ❌ não existe
    if (status === "NAO_EXISTE") {
      setTitulo("Erro");
      setStatus("❌ TAG não existe");
      return;
    }

    // 🔥 já usada (fallback extra)
    if (status === "USADO") {

      setTitulo("TAG já ativada");
      setStatus("🐾 Esta TAG já está em uso. Redirecionando...");

      setTimeout(() => {
        window.location.href = "/?id=" + id;
      }, 2000);

      return;
    }

    // 🟢 LIVRE → ativação
    if (status === "LIVRE") {

      setTitulo("Ativação necessária");
      setStatus("Preencha os dados...");

      let nome = prompt("Nome do pet:");
      let tel = prompt("WhatsApp:");
      let tutor = prompt("Tutor:");

      if (!nome || !tel) {
        setStatus("⚠️ Dados incompletos");
        return;
      }

      setStatus("Ativando...");

      let ativacao = await fetch(
        API +
        "?id=" + id +
        "&nome=" + encodeURIComponent(nome.trim()) +
        "&tel=" + encodeURIComponent(tel.trim()) +
        "&tutor=" + encodeURIComponent((tutor || "").trim())
      );

      let rawAtivacao = await ativacao.text();

      let resultado = rawAtivacao.trim().toUpperCase();

      console.log("RESULTADO:", resultado);

      // 🔥 CORREÇÃO AQUI
      if (!resultado.includes("ATIVADO")) {
        setStatus("❌ Erro ao ativar");
        return;
      }

      setStatus("✅ Ativado com sucesso!");

      setTimeout(() => {
        window.location.href = "/?id=" + id;
      }, 1500);

      return;
    }

    // fallback
    setStatus("Erro inesperado: " + raw);

  } catch (err) {
    console.error(err);
    setStatus("❌ Erro de conexão");
  }

}

// helpers
function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function setTitulo(msg) {
  document.getElementById("titulo").innerText = msg;
}

ativarAutomatico();

</script>

</body>
</html>
