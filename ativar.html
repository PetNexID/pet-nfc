<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Ativação da TAG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1f3a44;
      color: #fff;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #2e5561;
      padding: 30px;
      border-radius: 12px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🐶 Ativação da TAG</h1>
    <p id="status">Verificando TAG...</p>
  </div>

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 🔥 CONFIGURAÇÃO
    const SUPABASE_URL = "https://wbinbiqurgbqfimjuyvh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function verificarTag() {
      const params = new URLSearchParams(window.location.search);
      const codigo = params.get("codigo");

      console.log("CODIGO:", codigo);

      if (!codigo) {
        return mostrarErro("Código inválido");
      }

      try {
        const { data, error } = await supabaseClient
          .from("pets")
          .select("*")
          .eq("codigo_tag", codigo)
          .limit(1);

        console.log("DATA:", data);
        console.log("ERROR:", error);

        if (error) throw error;

        // TAG NÃO EXISTE
        if (!data || data.length === 0) {
          return mostrarErro("❌ TAG não encontrada");
        }

        const pet = data[0];

        // 🔥 LÓGICA CORRETA (BASEADA NO SEU BANCO)
        if (pet.ativo === true) {
          atualizarStatus("🔎 TAG ativa encontrada...");
          setTimeout(() => {
            window.location.href = `/pet.html?codigo=${codigo}`;
          }, 1000);
        } else {
          atualizarStatus("⚙️ TAG disponível para ativação...");
          setTimeout(() => {
            window.location.href = `/ativar-form.html?codigo=${codigo}`;
          }, 1000);
        }

      } catch (err) {
        console.error("ERRO:", err);
        mostrarErro("⚠️ Erro ao verificar TAG");
      }
    }

    function atualizarStatus(msg) {
      document.getElementById("status").innerText = msg;
    }

    function mostrarErro(msg) {
      document.getElementById("status").innerText = msg;
    }

    verificarTag();
  </script>

</body>
</html>
