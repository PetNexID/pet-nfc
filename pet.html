<!DOCTYPE html>
<html>
<head>
  <title>Pet</title>
</head>
<body>

<h1 id="nome">Carregando...</h1>
<p id="telefone"></p>

<!-- 🔥 CARREGA SUPABASE PRIMEIRO -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const codigo = urlParams.get('codigo');

// 🔥 AGORA FUNCIONA
const supabaseClient = supabase.createClient(
  "https://wbinbiqurgbqfimjuyvh.supabase.co",
  "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF"
);

async function carregar() {
  const { data, error } = await supabaseClient
    .from('pets')
    .select('*')
    .eq('codigo_tag', codigo)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h1>Tag não encontrada</h1>";
    return;
  }

  if (!data.ativo) {
    document.body.innerHTML = "<h1>Tag não ativada</h1>";
    return;
  }

  document.getElementById("nome").innerText = data.nome_pet;
  document.getElementById("telefone").innerText = data.telefone;
}

carregar();
</script>

</body>
</html>
