<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet NeX ID</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

.card {
  max-width: 380px;
  margin: 60px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.logo {
  width: 200px;
  margin-bottom: 10px;
}

.status {
  background: #ff2e2e;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.info {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  margin: 15px 0;
}

a {
  display: block;
  margin: 10px auto;
  padding: 14px;
  width: 90%;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

.whatsapp { background: linear-gradient(90deg,#00c6ff,#0072ff); }
.ligar { background: linear-gradient(90deg,#ff7e5f,#feb47b); }
</style>
</head>

<body>

<div class="card">
<img src="Logo.png" class="logo">

<div class="status">🐾 PET PERDIDO</div>

<h1 id="nome">Carregando...</h1>

<div class="info">
Tutor: <span id="tutor">---</span>
</div>

<a id="whatsapp" class="whatsapp" target="_blank">
📍 Avisar dono via WhatsApp
</a>

<a id="ligar" class="ligar">
📞 Ligar para o dono
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const codigo = urlParams.get('codigo');

const supabaseClient = supabase.createClient(
  "https://wbinbiqurgbqfimjuyvh.supabase.co",
  "sb_publishable_xlRH0L3lgXvrOPNBqRmOiw_1y9EVonF"
);

async function carregar() {

  const { data, error } = await supabaseClient
    .from('pets')
    .select('*')
    .eq('codigo_tag', codigo)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h1>Tag não encontrada</h1>";
    return;
  }

  const okLocal = localStorage.getItem("tag_ok_" + codigo);

  if (data.status !== "USADA" && !okLocal) {
    window.location.href = "ativar.html?codigo=" + codigo;
    return;
  }

  localStorage.removeItem("tag_ok_" + codigo);

  document.getElementById("nome").innerText = data.nome_pet;
  document.getElementById("tutor").innerText = data.nome_tutor;

  document.getElementById("whatsapp").href =
    "https://wa.me/55" + data.telefone;

  document.getElementById("ligar").href =
    "tel:+55" + data.telefone;
}

carregar();
</script>

</body>
</html>
