<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetNex ID</title>

<style>

body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', Arial;
  background: radial-gradient(circle at top, #1c3b34, #0b1c22 70%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border-radius: 22px;
  padding: 25px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  color: white;
}

.logo {
  width: 150px;
  margin-bottom: 10px;
}

.status {
  background: red;
  padding: 6px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.tutor-box {
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
}

.whats {
  background: linear-gradient(45deg,#00ffb3,#00c6ff);
}

.ligar {
  background: linear-gradient(45deg,#ff7e5f,#ffb88c);
}

</style>

</head>

<body>

<div class="card">

<img src="Logo.png" class="logo">

<div class="status">🚨 PET PERDIDO 🚨</div>

<h1 id="nome">Carregando...</h1>

<div class="tutor-box">
Tutor: <strong id="tutor">---</strong>
</div>

<button class="whats" onclick="enviar()">📍 WhatsApp</button>
<button class="ligar" onclick="ligar()">📞 Ligar</button>

</div>

<script>

let telefone = "";
let nomePet = "";

const API = "https://script.google.com/macros/s/AKfycbww_8i3tmo0RTu_q5FCvQl1Q5O5-NDt4yAQ9pigX9Hsb-WCzO4x6qJFCoh3JwB5F3I8/exec";

const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  document.getElementById("nome").innerText = "Link inválido";
} else {
  carregar();
}

async function carregar() {

  try {

    let res = await fetch(API + "?id=" + id + "&consulta=1");
    let txt = await res.text();

    if (txt === "INVALIDO") {
      throw new Error();
    }

    let data = JSON.parse(txt);

    nomePet = data.nome;
    telefone = data.tel;

    document.getElementById("nome").innerText = "🐶 " + data.nome;
    document.getElementById("tutor").innerText = data.tutor;

  } catch {
    document.getElementById("nome").innerText = "Erro ao carregar";
  }
}

function enviar() {

  if (!telefone) return alert("Telefone não disponível");

  navigator.geolocation.getCurrentPosition((pos) => {

    let maps = "https://maps.google.com/?q=" +
      pos.coords.latitude + "," + pos.coords.longitude;

    let msg = encodeURIComponent("🐶 Encontrei " + nomePet + "!\n📍 " + maps);

    window.location.href = "https://wa.me/" + telefone + "?text=" + msg;

  });
}

function ligar() {
  if (!telefone) return alert("Telefone não disponível");
  window.location.href = "tel:" + telefone;
}

</script>

</body>
</html>
